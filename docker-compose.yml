# ── Finesse Chess Analysis — Docker Compose ──────────────────────────
# Usage:
#   docker compose up              — start all services
#   docker compose up web worker   — start only web + worker
#   docker compose up -d           — start in background
#   docker compose down            — stop all services

services:
  # ── Redis (broker + cache) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Django web server (gunicorn, internal only) ───────────────────
  web:
    build: .
    volumes:
      - static_files:/app/staticfiles
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      - SERVICE=web
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHES_DEFAULT_LOCATION=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx (public-facing reverse proxy) ──────────────────────────
  nginx:
    image: nginx:1-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web
    restart: unless-stopped

  # ── DB init (runs migrations + seeds allauth Site + static) ──────
  db-init:
    build: .
    command: >
      bash -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      python -c \"import django, os; os.environ.setdefault('DJANGO_SETTINGS_MODULE','chessslizer.settings'); django.setup(); from django.contrib.sites.models import Site; Site.objects.get_or_create(id=1, defaults={'domain':'localhost','name':'Finesse'})\""
    volumes:
      - static_files:/app/staticfiles
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHES_DEFAULT_LOCATION=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  # ── Celery worker (runs Stockfish analysis) ────────────────────────
  worker:
    build: .
    command: celery -A chessslizer worker -l info -c 2
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - SERVICE=worker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHES_DEFAULT_LOCATION=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery beat (periodic tasks: session cleanup) ──────────────────
  beat:
    build: .
    command: celery -A chessslizer beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - SERVICE=beat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHES_DEFAULT_LOCATION=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  static_files:
