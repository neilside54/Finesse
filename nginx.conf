# ── nginx.conf — Finesse Chess Analysis ─────────────────────────────
# Serves the Vite SPA (index.html + assets) directly from disk and
# proxies /api/* and /accounts/* to the Django application running
# behind gunicorn on port 8001.

upstream django {
    server web:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ── Static files (Vite build output + Django collected static) ──
    location /static/ {
        alias /app/staticfiles/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Favicon / assets from Vite build root ──────────────────────
    location /assets/ {
        alias /app/staticfiles/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── API endpoints → Django ─────────────────────────────────────
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running Stockfish analysis can take a while
        proxy_read_timeout 1800s;
        proxy_connect_timeout 10s;
    }

    # ── Allauth auth endpoints → Django ────────────────────────────
    location /accounts/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django admin → Django ──────────────────────────────────────
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Favicon ───────────────────────────────────────────────────
    location = /favicon.ico {
        return 204;
    }

    # ── SPA catch-all: serve index.html for all other paths ────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
